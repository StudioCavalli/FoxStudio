# FoxStudio — local stateful services for development.
#
# Why this exists: in dev we don't want to depend on Neon (Postgres SaaS) or
# Cloudflare R2 (object storage SaaS) — both are great for prod but slow you
# down locally. This compose file boots Postgres + MinIO (S3-compatible) on
# localhost in seconds, giving Payload a real DB and a real S3-style backend.
#
# Quick start :
#   pnpm services:up
#   pnpm payload:migrate
#   pnpm dev
#
# Stop without losing data : `pnpm services:down`
# Wipe everything and restart fresh : `pnpm services:reset`

name: foxstudio

services:
  postgres:
    image: postgres:17-alpine
    container_name: foxstudio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: foxstudio
      POSTGRES_PASSWORD: foxstudio
      POSTGRES_DB: foxstudio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxstudio -d foxstudio"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: foxstudio-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: foxstudio
      MINIO_ROOT_PASSWORD: foxstudio-dev-secret
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job that creates the bucket and makes it publicly readable.
  # Runs once on `services:up`, exits cleanly.
  minio-init:
    image: minio/mc:latest
    container_name: foxstudio-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: foxstudio
      MINIO_ROOT_PASSWORD: foxstudio-dev-secret
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        (mc mb -p local/foxstudio-media 2>/dev/null || true) &&
        mc anonymous set download local/foxstudio-media &&
        echo '✓ Bucket foxstudio-media ready (public read)';
      "

volumes:
  postgres-data:
    name: foxstudio-postgres-data
  minio-data:
    name: foxstudio-minio-data
